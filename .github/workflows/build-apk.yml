name: Build APK
on:
  workflow_dispatch

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix gradlew & grant permission
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      # ========== 解码密钥文件（必须在 Gradle 构建前） ==========
      - name: Decode keystore
        run: |
          echo "${{ secrets.XSCREEN_JSK }}" | base64 -d > ${{ github.workspace }}/myAPP.jks
          ls -lh myAPP.jks

      # ========== 自动版本号自增 ==========
      - name: Auto increment version
        run: |
          OLD_VER=$(grep versionName app/build.gradle | awk '{print $NF}' | tr -d "\"'")
          V1=$(echo "$OLD_VER" | cut -d'.' -f1)
          V2=$(echo "$OLD_VER" | cut -d'.' -f2)
          V3=$(echo "$OLD_VER" | cut -d'.' -f3)
          
          V3=$((V3 + 5))
          if [ "$V3" -ge 99 ]; then
            V3=0
            V2=$((V2 + 1))
            [ "$V2" -ge 99 ] && { V2=0; V1=$((V1 + 1)); }
          fi
          
          NEW_VER="${V1}.${V2}.${V3}"
          sed -i "s/versionName\s*=.*[\"'].*[\"']/versionName = \"${NEW_VER}\"/g" app/build.gradle
          echo "NEW_VER=$NEW_VER" >> "$GITHUB_ENV"

      - name: Set build datetime
        run: |
          echo "DATE=$(date +%Y-%m-%d)" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date +%H:%M:%S)" >> "$GITHUB_ENV"

      # ========== Gradle 构建 + 自动签名（通过环境变量） ==========
      - name: Build Release APK
        run: ./gradlew clean assembleRelease --no-build-cache
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/myAPP.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ALIAS }}
          # KEY_PASSWORD 与 KEYSTORE_PASSWORD 相同，可省略（已在 build.gradle 中处理）

      # ========== 验证签名（可选） ==========
      - name: Verify APK signature
        run: |
          APK_PATH=app/build/outputs/apk/release/*.apk
          # 使用 Android SDK 自带的 apksigner（已由 setup-android 安装）
          apksigner verify --verbose $APK_PATH

      # ========== 重命名 APK ==========
      - name: Rename APK
        run: |
          APK_NAME="X-screen_v${{ env.NEW_VER }}_${{ env.DATE }}.apk"
          mv app/build/outputs/apk/release/*.apk app/build/outputs/apk/release/"$APK_NAME"
          echo "APK_FILE=app/build/outputs/apk/release/$APK_NAME" >> "$GITHUB_ENV"

      # ========== 提交版本号变更 ==========
      - name: Commit version update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add app/build.gradle
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto bump version to ${{ env.NEW_VER }} [skip ci]"
            git push
          fi

      # ========== 生成 changelog ==========
      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commitMode: true

      # ========== 拼接 Release 正文 ==========
      - name: Build release body
        id: build_body
        run: |
          FULL_BODY="
            ✅ 编译完成 🎉🎉🎉🎉🎉
          📱 应用版本：v${{ env.NEW_VER }}
          📅 编译时间：${{ env.DATE }} ${{ env.BUILD_TIME }}
          📦 构建编号：${{ github.run_number }}
          🛠️ 功能：解除部分APP截图权限限制
          ${{ steps.changelog.outputs.changelog }}"
          
          EOF=$(head -c15 /dev/urandom | base64)
          echo "full_body<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$FULL_BODY" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      # ========== 创建 Release 并上传 APK ==========
      - name: Create Release & upload APK
        uses: softprops/action-gh-release@v2
        with:
          name: "X-screen 构建 #${{ github.run_number }} | v${{ env.NEW_VER }}"
          tag_name: "v${{ env.NEW_VER }}"
          files: ${{ env.APK_FILE }}
          body: ${{ steps.build_body.outputs.full_body }}
          overwrite_files: true
