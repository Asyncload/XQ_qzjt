name: Build APK
on:
  workflow_dispatch: # 手动触发工作流
# 授权：允许写入代码、创建Tag/Release
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 配置 JDK17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      # 配置 Android SDK 环境
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 修复换行符 + 授予gradlew执行权限
      - name: Fix gradlew & grant permission
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      # 自动版本号自增 每次+5，99进位
      - name: Auto increment version
        run: |
          OLD_VER=$(grep versionName app/build.gradle | awk '{print $NF}' | tr -d "\"'")
          V1=$(echo "$OLD_VER" | cut -d'.' -f1)
          V2=$(echo "$OLD_VER" | cut -d'.' -f2)
          V3=$(echo "$OLD_VER" | cut -d'.' -f3)
          
          V3=$((V3 + 5))
          if [ "$V3" -ge 99 ]; then
            V3=0
            V2=$((V2 + 1))
            [ "$V2" -ge 99 ] && { V2=0; V1=$((V1 + 1)); }
          fi
          
          NEW_VER="${V1}.${V2}.${V3}"
          sed -i "s/versionName\s*=.*[\"'].*[\"']/versionName = \"${NEW_VER}\"/g" app/build.gradle
          echo "NEW_VER=$NEW_VER" >> "$GITHUB_ENV"

      # 生成编译日期时间变量
      - name: Set build datetime
        run: |
          echo "DATE=$(date +%Y-%m-%d)" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date +%H:%M:%S)" >> "$GITHUB_ENV"

      # 编译Release正式包
      - name: Build Release APK
        run: ./gradlew clean assembleRelease --no-build-cache

      # 解析Base64密钥文件
      - name: Decode keystore
        run: echo "${{ secrets.XCREEN_JKS }}" | base64 -d > my-release-key.jks

      # zipalign对齐 + jarsigner签名
      - name: Align & Sign APK
        run: |
          ZIPALIGN="$ANDROID_HOME/build-tools/34.0.0/zipalign"
          UNSIGNED=app/build/outputs/apk/release/app-release-unsigned.apk
          ALIGNED=app/build/outputs/apk/release/app-release-aligned.apk
          SIGNED=app/build/outputs/apk/release/app-release-signed.apk
          
          "$ZIPALIGN" -v -p 4 "$UNSIGNED" "$ALIGNED"
          
          jarsigner -verbose \
            -sigalg SHA1withRSA \
            -digestalg SHA1 \
            -keystore my-release-key.jks \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEYSTORE_PASSWORD }} \
            -signedjar "$SIGNED" "$ALIGNED" ${{ secrets.ALIAS }}
          
          rm -f my-release-key.jks

      # 重命名APK + 提交版本号变更并推送
      - name: Rename APK & commit version
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          
          APK_NAME="X-screen_v${{ env.NEW_VER }}_${{ env.DATE }}.apk"
          mv app/build/outputs/apk/release/app-release-signed.apk app/build/outputs/apk/release/"$APK_NAME"
          echo "APK_FILE=app/build/outputs/apk/release/$APK_NAME" >> "$GITHUB_ENV"
          
          git add app/build.gradle
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto bump version to ${{ env.NEW_VER }} [skip ci]"
            git push
          fi

      # 自动生成提交日志更新内容
      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commitMode: true

      # 拼接Release发布文案
      - name: Build release body
        id: build_body
        run: |
          FULL_BODY="
            ✅ 编译完成 🎉🎉🎉🎉🎉
          📱 应用版本：v${{ env.NEW_VER }}
          📅 编译时间：${{ env.DATE }} ${{ env.BUILD_TIME }}
          📦 构建编号：${{ github.run_number }}
          🛠️ 功能：解除部分APP截图权限限制

          ${{ steps.changelog.outputs.changelog }}"
          
          EOF=$(head -c15 /dev/urandom | base64)
          echo "full_body<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$FULL_BODY" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      # 创建Release、打Tag、上传APK附件
      - name: Create Release & upload APK
        uses: softprops/action-gh-release@v2
        with:
          name: "X-screen 构建 #${{ github.run_number }} | v${{ env.NEW_VER }}"
          tag_name: "v${{ env.NEW_VER }}"
          files: ${{ env.APK_FILE }}
          body: ${{ steps.build_body.outputs.full_body }}
          overwrite_files: true
