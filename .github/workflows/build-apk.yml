name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 下载代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 设置 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Fix gradlew line endings
        run: sed -i 's/\r$//' gradlew

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      # --- 新增签名步骤 ---
       - name: 安装 apksigner
         run: sudo apt-get update && sudo apt-get install -y apksigner
       - name: 生成临时签名密钥
         run: |
           keytool -genkey -v -keystore my-release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias myalias -storepass password789 -keypass password789 -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, S=Unknown, C=Unknown"
       - name: 签名 APK
         run: |
           apksigner sign --ks my-release-key.jks --ks-pass pass:password789 --key-pass pass:password789 --alias myalias app/build/outputs/apk/release/*.apk

      - name: Upload Release APK
        uses: softprops/action-gh-release@v2
        with:
          name: X-screen
          tag_name: X-screen-v${{ github.run_number }}  # 用构建号作为版本标签，每次构建都会自动生成新标签
          
          files: |
            app/build/outputs/apk/release/*.apk
            overwrite_files: true
