name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Fix gradlew line endings
        run: sed -i 's/\r$//' gradlew

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew clean assembleRelease --no-build-cache

      - name: 生成临时签名密钥
        run: |
          keytool -genkey -v -keystore my-release-key.jks -keyalg RSA -keysize 2048 -validity 10000 \
          -alias myalias -storepass password789 -keypass password789 \
          -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, S=Unknown, C=Unknown"

      - name: 用jarsigner签名APK
        run: |
          jarsigner -verbose \
            -keystore my-release-key.jks \
            -storepass password789 \
            -keypass password789 \
            -signedjar app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            myalias

      # 方案三：读取仓库变量 + 带进位自增（不修改源码、不提交代码）
      - name: 版本自动进位 + 重命名APK
        run: |
          # 读取仓库储存的版本号
          OLD_VER="${{ vars.APP_VERSION }}"
          
          # 拆分三段版本
          V1=$(echo $OLD_VER | cut -d'.' -f1)
          V2=$(echo $OLD_VER | cut -d'.' -f2)
          V3=$(echo $OLD_VER | cut -d'.' -f3)

          # 进位逻辑：1.1.9 → 1.2.0
          V3=$((V3 + 1))
          if [ $V3 -ge 10 ]; then
            V3=0
            V2=$((V2 + 1))
            if [ $V2 -ge 10 ]; then
              V2=0
              V1=$((V1 + 1))
            fi
          fi

          NEW_VER="${V1}.${V2}.${V3}"

          # 日期 + 带冒号时间
          DATE=$(date +%Y-%m-%d)
          TIME=$(date +%H:%M:%S)

          # 注入全局变量给Release使用
          echo "VERSION=$NEW_VER" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "BUILD_TIME=$TIME" >> $GITHUB_ENV

          # 重命名APK
          NEW_NAME="X-screen_v${NEW_VER}_${DATE}.apk"
          mv app/build/outputs/apk/release/app-release-signed.apk app/build/outputs/apk/release/$NEW_NAME
          echo "APK_FILE=app/build/outputs/apk/release/$NEW_NAME" >> $GITHUB_ENV

      # 更新仓库变量 → 永久保存新版本，下次继续递增
      - name: 更新储存的版本号
        uses: actions/github-script@v6
        with:
          script: |
            let v = process.env.VERSION;
            await github.rest.repos.createOrUpdateEnvironmentVariable({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'APP_VERSION',
              value: v
            });

      - name: Upload Release APK
        uses: softprops/action-gh-release@v2
        with:
          name: "X-screen-v${{ github.run_number }} (v${{ env.VERSION }})"
          files: ${{ env.APK_FILE }}
          tag_name: "v${{ env.VERSION }}"
          body: |
            ✅ 编译完成！
            📱 应用版本: v${{ env.VERSION }}
            📅 编译时间: ${{ env.DATE }} ${{ env.BUILD_TIME }}
            📦 构建编号: ${{ github.run_number }}
            🛠️ 功能: 解除某些APP屏蔽了截图权限。
          overwrite_files: true
